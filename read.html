<!DOCTYPE html>
<html lang="en">

    <title>Blog Platform for Users</title>
    <link rel="stylesheet" href="assets/css/read.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 id="title">alksdjflajsdlk</h1>
            </div>
        </div>

    <div class="main">
        <h2>Blog Content</h2>
        <div id="maincontent">
            alsdkjf
        </div>

                    <button type="submit" id="submit" class="btn">Comment</button>

            <div id="comments">
                hello

    </section>
